model:
  provider: mimo
  model_name: mimo-v2.5-pro
  base_url: https://token-plan-cn.xiaomimimo.com/v1
  api_key_env: MIMO_API_KEY
  temperature: 0.7

embedding:
  provider: local
  model: BAAI/bge-m3

memory:
  vector_store: chromadb
  persist_directory: ./data/vector_store

world:
  tick_interval_seconds: 1
  default_time_scale: 1.0
