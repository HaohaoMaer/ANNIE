<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANNIE NPC Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --panel-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --green: #3fb950;
    --yellow: #d2991d;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --accent: #1f6feb;
    --font-mono: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Bar ─────────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    min-height: 44px;
    flex-shrink: 0;
  }
  #topbar h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
    white-space: nowrap;
  }
  #topbar .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #topbar .status-dot.disconnected { background: var(--red); animation: none; }
  #topbar .info { color: var(--text-dim); font-size: 12px; }
  #topbar .info span { color: var(--text); font-weight: 600; }
  #topbar .controls { margin-left: auto; display: flex; gap: 8px; }
  #topbar button {
    background: var(--accent);
    color: #fff; border: none;
    padding: 4px 12px; border-radius: 4px;
    font-size: 12px; cursor: pointer;
  }
  #topbar button:hover { opacity: 0.85; }
  #topbar button.secondary { background: var(--border); }

  /* ── Main Layout ──────────────────────────────────────────── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left Panel (Status) ──────────────────────────────────── */
  #left-panel {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px;
    gap: 10px;
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .stat-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
    font-size: 13px;
  }
  .stat-row .label { color: var(--text-dim); }
  .stat-row .value { font-family: var(--font-mono); font-weight: 600; }

  .bar-container {
    background: var(--border);
    border-radius: 3px;
    height: 8px;
    margin-top: 2px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .bar-health { background: var(--red); }
  .bar-hunger { background: var(--yellow); }

  .pos-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--blue);
  }

  /* Inventory grid */
  .inv-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2px 8px;
    font-size: 12px;
    max-height: 120px;
    overflow-y: auto;
  }
  .inv-grid .inv-name { color: var(--text); }
  .inv-grid .inv-count { color: var(--green); font-family: var(--font-mono); text-align: right; }
  .inv-empty { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* Nearby entities */
  .entity-list {
    font-size: 12px;
    max-height: 100px;
    overflow-y: auto;
  }
  .entity-hostile { color: var(--red); }
  .entity-player { color: var(--blue); }
  .entity-item { color: var(--yellow); }

  /* ── Center Panel (Thoughts & Actions) ────────────────────── */
  #center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px;
    gap: 10px;
  }
  .thought-bubble {
    background: var(--panel-bg);
    border-left: 3px solid var(--purple);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
  }
  .thought-bubble .label {
    color: var(--purple);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .dialogue-bubble {
    background: var(--panel-bg);
    border-left: 3px solid var(--green);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
  }
  .dialogue-bubble .label {
    color: var(--green);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .goal-banner {
    background: #1a2332;
    border: 1px solid var(--blue);
    border-radius: 6px;
    padding: 12px;
    text-align: center;
    font-size: 14px;
    color: var(--blue);
  }
  .action-tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    margin: 2px;
  }
  .reflection-card {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .reflection-card .label {
    color: var(--yellow);
    font-size: 10px;
    text-transform: uppercase;
  }

  /* ── Right Panel (Event Log) ───────────────────────────────── */
  #right-panel {
    width: 320px;
    flex-shrink: 0;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #right-panel h3 {
    padding: 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  #event-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .event-entry {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 8px;
    background: var(--bg);
    border-radius: 3px;
    border-left: 2px solid var(--border);
  }
  .event-damage { border-left-color: var(--red); }
  .event-death { border-left-color: var(--red); background: #2d1111; }
  .event-chat { border-left-color: var(--blue); }
  .event-command { border-left-color: var(--green); }
  .event-reflex { border-left-color: var(--yellow); }
  .event-action { border-left-color: var(--purple); }
  .event-time { color: var(--text-dim); margin-right: 6px; }

  /* ── Bottom Command Bar ────────────────────────────────────── */
  #cmd-bar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: var(--panel-bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 44px;
    align-items: center;
  }
  #cmd-bar label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  #cmd-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-mono);
    outline: none;
  }
  #cmd-input:focus { border-color: var(--accent); }
  #cmd-send {
    background: var(--green);
    color: #000;
    border: none;
    padding: 6px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #cmd-send:hover { opacity: 0.85; }
  #cmd-hint {
    font-size: 11px;
    color: var(--text-dim);
    padding: 2px 16px;
    flex-shrink: 0;
  }

  /* ── Viewer Overlay ────────────────────────────────────────── */
  #viewer-overlay {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 432px;
    height: 270px;
    background: #000;
    border: 2px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    resize: both;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    display: none;
  }
  #viewer-overlay.visible { display: block; }
  #viewer-overlay iframe {
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none; /* read-only view */
  }
  #viewer-handle {
    height: 24px;
    background: var(--panel-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    cursor: move;
    font-size: 11px;
  }
  #viewer-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
  }
  #viewer-close:hover { color: var(--red); }

  /* ── Dashboard toggle ──────────────────────────────────────── */
  .collapsed { display: none !important; }

  @media (max-width: 900px) {
    #main { flex-direction: column; }
    #left-panel { width: 100%; flex-shrink: 0; max-height: 200px; }
    #right-panel { width: 100%; max-height: 200px; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <div class="status-dot" id="status-dot" title="连接状态"></div>
  <h1>ANNIE Monitor</h1>
  <div class="info">NPC: <span id="npc-name">-</span></div>
  <div class="info">Tick: <span id="tick-count">0</span></div>
  <div class="info">耗时: <span id="tick-duration">0</span>s</div>
  <div class="controls">
    <button onclick="toggleViewer()" title="切换第一视角">🎥 第一视角</button>
    <button class="secondary" onclick="toggleLeft()" title="显示/隐藏状态面板">📊</button>
    <button class="secondary" onclick="toggleRight()" title="显示/隐藏事件日志">📋</button>
  </div>
</div>

<!-- Main Content -->
<div id="main">

  <!-- Left: NPC State -->
  <div id="left-panel">
    <div class="stat-card">
      <h3>❤️ 生命值 & 🍗 饥饿度</h3>
      <div class="stat-row"><span class="label">生命值</span><span class="value" id="s-health">20/20</span></div>
      <div class="bar-container"><div class="bar-fill bar-health" id="bar-health" style="width:100%"></div></div>
      <div class="stat-row" style="margin-top:6px"><span class="label">饥饿度</span><span class="value" id="s-hunger">20/20</span></div>
      <div class="bar-container"><div class="bar-fill bar-hunger" id="bar-hunger" style="width:100%"></div></div>
    </div>

    <div class="stat-card">
      <h3>📍 位置</h3>
      <div class="pos-value" id="s-pos">(0, 0, 0)</div>
      <div class="stat-row"><span class="label">生物群系</span><span class="value" id="s-biome">-</span></div>
      <div class="stat-row"><span class="label">时间</span><span class="value" id="s-time">-</span></div>
      <div class="stat-row"><span class="label">天气</span><span class="value" id="s-weather">-</span></div>
    </div>

    <div class="stat-card">
      <h3>🎒 物品栏</h3>
      <div id="s-inv"><div class="inv-empty">等待数据...</div></div>
      <div id="s-held" style="font-size:11px;color:var(--yellow);margin-top:4px"></div>
    </div>

    <div class="stat-card">
      <h3>👀 周围实体</h3>
      <div class="entity-list" id="s-entities">
        <div class="inv-empty">等待数据...</div>
      </div>
    </div>
  </div>

  <!-- Center: Thoughts & Actions -->
  <div id="center-panel">
    <div class="goal-banner" id="s-goal">🎯 初始化中...</div>

    <div id="s-thought" class="thought-bubble" style="display:none">
      <div class="label">💭 内心想法</div>
      <div class="content"></div>
    </div>

    <div id="s-dialogue" class="dialogue-bubble" style="display:none">
      <div class="label">💬 对话</div>
      <div class="content"></div>
    </div>

    <div id="s-actions" style="display:none">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">🔧 执行动作</div>
      <div class="actions-list"></div>
    </div>

    <div id="s-reflection" class="reflection-card" style="display:none">
      <div class="label">📝 反思</div>
      <div class="content"></div>
    </div>

    <div id="s-idle" style="color:var(--text-dim);font-size:13px;text-align:center;padding:40px">
      等待 NPC 响应...
    </div>
  </div>

  <!-- Right: Event Log -->
  <div id="right-panel">
    <h3>📜 事件日志</h3>
    <div id="event-log">
      <div class="event-entry" style="color:var(--text-dim)">等待事件...</div>
    </div>
  </div>
</div>

<!-- Command Bar -->
<div id="cmd-bar">
  <label>💬 指令:</label>
  <input id="cmd-input" type="text" placeholder="输入给 NPC 的指令，例如：去砍一棵树、合成一把剑..."
         autofocus onkeydown="if(event.key==='Enter')sendCommand()">
  <button id="cmd-send" onclick="sendCommand()">发送</button>
</div>
<div id="cmd-hint">按 Enter 发送 | 指令会作为 [玩家指令] 事件推送给 NPC</div>

<!-- First-Person Viewer Overlay -->
<div id="viewer-overlay">
  <div id="viewer-handle">
    <span>🎥 NPC 第一视角</span>
    <button id="viewer-close" onclick="toggleViewer()">✕</button>
  </div>
  <iframe id="viewer-iframe" src="about:blank"></iframe>
</div>

<script>
// ── Configuration ────────────────────────────────────────────
const POLL_INTERVAL = 800;  // ms between state polls
const VIEWER_PORT = 3000;   // default prismarine-viewer port

// ── State ────────────────────────────────────────────────────
let lastEventCount = 0;
let viewerVisible = false;

// ── API calls ────────────────────────────────────────────────
async function fetchState() {
  try {
    const resp = await fetch('/api/state');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (e) {
    return { error: e.message };
  }
}

async function sendCommand() {
  const input = document.getElementById('cmd-input');
  const cmd = input.value.trim();
  if (!cmd) return;

  try {
    const resp = await fetch('/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd }),
    });
    const result = await resp.json();
    if (result.ok) {
      input.value = '';
      // Flash green
      input.style.borderColor = '#3fb950';
      setTimeout(() => input.style.borderColor = '', 500);
    } else {
      alert('发送失败: ' + (result.reason || 'unknown'));
    }
  } catch (e) {
    alert('发送错误: ' + e.message);
  }
}

// ── Render ───────────────────────────────────────────────────
function render(state) {
  if (state.error) {
    document.getElementById('status-dot').classList.add('disconnected');
    return;
  }

  document.getElementById('status-dot').classList.remove('disconnected');
  document.getElementById('npc-name').textContent = state.npc_id || '-';
  document.getElementById('tick-count').textContent = state.tick_count;
  document.getElementById('tick-duration').textContent =
    (state.last_tick_duration || 0).toFixed(1);

  // Health & Hunger
  const hp = state.health || 0;
  const hunger = state.hunger || 0;
  document.getElementById('s-health').textContent = `${hp}/20`;
  document.getElementById('bar-health').style.width = `${(hp/20)*100}%`;
  document.getElementById('bar-health').style.background =
    hp > 10 ? '#3fb950' : hp > 5 ? '#d2991d' : '#f85149';
  document.getElementById('s-hunger').textContent = `${hunger}/20`;
  document.getElementById('bar-hunger').style.width = `${(hunger/20)*100}%`;

  // Position
  const pos = state.position || [0,0,0];
  document.getElementById('s-pos').textContent =
    `(${pos[0]?.toFixed(1)}, ${pos[1]?.toFixed(1)}, ${pos[2]?.toFixed(1)})`;
  document.getElementById('s-biome').textContent = state.biome || '-';
  document.getElementById('s-time').textContent = state.time_of_day || '-';
  document.getElementById('s-weather').textContent = state.weather || '-';

  // Inventory
  const inv = state.inventory || {};
  const invKeys = Object.keys(inv);
  if (invKeys.length > 0) {
    const invHtml = invKeys
      .sort((a,b) => inv[b] - inv[a])
      .map(k => `<div class="inv-name">${k}</div><div class="inv-count">x${inv[k]}</div>`)
      .join('');
    document.getElementById('s-inv').innerHTML =
      `<div class="inv-grid">${invHtml}</div>`;
  } else {
    document.getElementById('s-inv').innerHTML =
      '<div class="inv-empty">物品栏为空</div>';
  }
  const held = state.held_item || '';
  document.getElementById('s-held').textContent = held ? `🖐 手持: ${held}` : '';

  // Nearby entities
  const hostiles = state.nearby_hostiles || [];
  const players = state.nearby_players || [];
  const items = state.nearby_items || [];
  let entHtml = '';
  if (hostiles.length) entHtml += hostiles.map(e => `<div class="entity-hostile">⚠ ${e}</div>`).join('');
  if (players.length) entHtml += players.map(e => `<div class="entity-player">👤 ${e}</div>`).join('');
  if (items.length) entHtml += items.map(e => `<div class="entity-item">📦 ${e}</div>`).join('');
  document.getElementById('s-entities').innerHTML = entHtml || '<div class="inv-empty">附近无实体</div>';

  // Goal
  document.getElementById('s-goal').textContent =
    `🎯 ${state.current_goal || '探索世界中...'}`;

  // Thought
  const thoughtEl = document.getElementById('s-thought');
  if (state.last_thought) {
    thoughtEl.style.display = 'block';
    thoughtEl.querySelector('.content').textContent = state.last_thought;
  } else {
    thoughtEl.style.display = 'none';
  }

  // Dialogue
  const dialogueEl = document.getElementById('s-dialogue');
  if (state.last_dialogue) {
    dialogueEl.style.display = 'block';
    dialogueEl.querySelector('.content').textContent = state.last_dialogue;
  } else {
    dialogueEl.style.display = 'none';
  }

  // Actions
  const actionsEl = document.getElementById('s-actions');
  const actions = state.last_actions || [];
  if (actions.length > 0) {
    actionsEl.style.display = 'block';
    actionsEl.querySelector('.actions-list').innerHTML =
      actions.map(a => `<span class="action-tag">${a}</span>`).join(' ');
  } else {
    actionsEl.style.display = 'none';
  }

  // Reflection
  const reflEl = document.getElementById('s-reflection');
  if (state.last_reflection) {
    reflEl.style.display = 'block';
    reflEl.querySelector('.content').textContent = state.last_reflection;
  } else {
    reflEl.style.display = 'none';
  }

  // Idle message
  const idleEl = document.getElementById('s-idle');
  if (!state.last_thought && !state.last_dialogue && actions.length === 0) {
    idleEl.style.display = 'block';
    idleEl.textContent = state.tick_count === 0 ? '等待首次 NPC 响应...' : 'NPC 空闲中...';
  } else {
    idleEl.style.display = 'none';
  }

  // Event log
  const events = state.events || [];
  const eventLog = document.getElementById('event-log');
  if (events.length !== lastEventCount) {
    lastEventCount = events.length;
    if (events.length === 0) {
      eventLog.innerHTML = '<div class="event-entry" style="color:var(--text-dim)">暂无事件</div>';
    } else {
      const now = Date.now() / 1000;
      eventLog.innerHTML = events.slice().reverse().map(e => {
        const secsAgo = Math.round(now - (e.time || now));
        const timeStr = secsAgo < 60 ? `${secsAgo}s前` :
          secsAgo < 3600 ? `${Math.floor(secsAgo/60)}m前` : '>1h前';
        let cls = 'event-entry';
        switch (e.type) {
          case 'damage': cls += ' event-damage'; break;
          case 'death': cls += ' event-death'; break;
          case 'chat': cls += ' event-chat'; break;
          case 'command': cls += ' event-command'; break;
          case 'reflex': cls += ' event-reflex'; break;
          case 'action': cls += ' event-action'; break;
        }
        const dataStr = typeof e.data === 'string' ? e.data :
          JSON.stringify(e.data, null, 0).replace(/[{}"]/g, '').substring(0, 100);
        return `<div class="${cls}"><span class="event-time">${timeStr}</span>${e.type}: ${dataStr}</div>`;
      }).join('');
    }
  }

  // Update viewer iframe port if changed
  const viewerPort = state.viewer_port || VIEWER_PORT;
  const iframe = document.getElementById('viewer-iframe');
  const viewerUrl = `http://localhost:${viewerPort}`;
  if (iframe.src !== viewerUrl && viewerVisible) {
    iframe.src = viewerUrl;
  }
}

// ── Viewer toggle ────────────────────────────────────────────
function toggleViewer() {
  viewerVisible = !viewerVisible;
  const overlay = document.getElementById('viewer-overlay');
  if (viewerVisible) {
    overlay.classList.add('visible');
    const iframe = document.getElementById('viewer-iframe');
    iframe.src = `http://localhost:${VIEWER_PORT}`;
  } else {
    overlay.classList.remove('visible');
  }
}

function toggleLeft() {
  document.getElementById('left-panel').classList.toggle('collapsed');
}
function toggleRight() {
  document.getElementById('right-panel').classList.toggle('collapsed');
}

// ── Drag viewer ──────────────────────────────────────────────
(function() {
  const overlay = document.getElementById('viewer-overlay');
  const handle = document.getElementById('viewer-handle');
  let dragging = false, offsetX = 0, offsetY = 0;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    offsetX = e.clientX - overlay.offsetLeft;
    offsetY = e.clientY - overlay.offsetTop;
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    overlay.style.left = (e.clientX - offsetX) + 'px';
    overlay.style.top = (e.clientY - offsetY) + 'px';
    overlay.style.right = 'auto';
    overlay.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Poll loop ────────────────────────────────────────────────
async function poll() {
  const state = await fetchState();
  render(state);
}

setInterval(poll, POLL_INTERVAL);
poll();  // immediate first poll
</script>
</body>
